[install-debian-ubuntu]
    add-repo        = curl -s https://packagecloud.io/install/repositories/ookla/speedtest-cli/script.deb.sh | sudo bash
    install         = sudo apt install speedtest -y

[conflict-fix]
    remove-old      = sudo apt remove speedtest-cli -y
    install-new     = sudo apt install speedtest -y

[usage]
    run             = speedtest
    list-servers    = speedtest --servers
    specific-server = speedtest --server-id=XXXX

[notes]
    packet-loss     = not all servers support packet loss, try different server IDs until you see it
    recommended     = use smaller ISP servers over big ones (Bell, Rogers etc) for full stats